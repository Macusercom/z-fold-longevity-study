<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Samsung Z Fold Longevity Study 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#11111d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.6">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.05" cy="0.95" r="0.6">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- subtle grid -->
  <g stroke="#1f1f2e" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
  </g>

  <!-- eyebrow -->
  <rect x="80" y="100" width="290" height="34" rx="17" fill="rgba(34, 211, 238, 0.08)" stroke="rgba(34, 211, 238, 0.35)"/>
  <text x="225" y="123" text-anchor="middle" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3">INDEPENDENT STUDY · 2026</text>

  <!-- title -->
  <text x="80" y="240" fill="#e7e7ee" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="86" font-weight="700" letter-spacing="-2">Samsung Z Fold</text>
  <text x="80" y="334" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="86" font-weight="700" letter-spacing="-2" fill="url(#accent)">Longevity Study</text>

  <!-- lede -->
  <text x="80" y="400" fill="#a4a4b6" font-family="-apple-system, BlinkMacSystemFont, Inter, sans-serif" font-size="28" font-weight="400">745 owners · 7 generations · 3rd annual report</text>

  <!-- stat tiles -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <rect x="80" y="460" width="240" height="100" rx="14" fill="rgba(255,255,255,0.02)" stroke="#1f1f2e"/>
    <text x="100" y="510" fill="#e7e7ee" font-size="42" font-weight="600">3.3%</text>
    <text x="100" y="540" fill="#6f6f82" font-size="14" letter-spacing="1.5">FOLD 7 RMA RATE · YEAR 1</text>

    <rect x="340" y="460" width="240" height="100" rx="14" fill="rgba(255,255,255,0.02)" stroke="#1f1f2e"/>
    <text x="360" y="510" fill="#34d399" font-size="42" font-weight="600">0%</text>
    <text x="360" y="540" fill="#6f6f82" font-size="14" letter-spacing="1.5">MICRO CRACKS · FOLD 7</text>

    <rect x="600" y="460" width="240" height="100" rx="14" fill="rgba(255,255,255,0.02)" stroke="#1f1f2e"/>
    <text x="620" y="510" fill="#fbbf24" font-size="42" font-weight="600">25%</text>
    <text x="620" y="540" fill="#6f6f82" font-size="14" letter-spacing="1.5">FLATNESS REGRESSION</text>
  </g>

  <!-- phone stack -->
  <g transform="translate(960, 200)">
    <rect x="-50" y="-110" width="80" height="220" rx="14" fill="#0a0a14" stroke="#2a2a3d" stroke-width="2" transform="rotate(-12 0 0) translate(-100 30)"/>
    <rect x="-50" y="-110" width="80" height="220" rx="14" fill="#0a0a14" stroke="#2a2a3d" stroke-width="2" transform="rotate(-6 0 0) translate(-50 10)"/>
    <rect x="-50" y="-110" width="80" height="220" rx="14" fill="#0a0a14" stroke="#2a2a3d" stroke-width="2"/>
    <rect x="-50" y="-110" width="80" height="220" rx="14" fill="#0a0a14" stroke="#2a2a3d" stroke-width="2" transform="rotate(6 0 0) translate(50 10)"/>
    <rect x="-50" y="-110" width="80" height="220" rx="14" fill="#0a0a14" stroke="#22d3ee" stroke-width="2" transform="rotate(12 0 0) translate(100 30)"/>
  </g>

  <!-- footer URL -->
  <text x="80" y="600" fill="#6f6f82" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" letter-spacing="2">macusercom.github.io/z-fold-longevity-study</text>
</svg>
